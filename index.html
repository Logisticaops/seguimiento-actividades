<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento Actividades — TCL Logistics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
:root{
  --pri:#525f7f;--acc:#2d7dd2;--bg:#f0f3f7;--card:#fff;
  --bdr:#d0d7e2;--muted:#6c757d;--txt:#1e2d3d;
  --grn:#19a34a;--ylw:#c9880a;--red:#c8303a;--pur:#6d3fc0;
  --grn-bg:#e6f7ee;--ylw-bg:#fff8e6;--red-bg:#fdecea;--pur-bg:#f0eafa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border:1px solid var(--bdr);border-radius:14px;padding:36px 40px;width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-card h1{font-size:1.2rem;font-weight:600;color:var(--pri);margin-bottom:6px;}
.login-card p{font-size:.8rem;color:var(--muted);margin-bottom:24px;}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border:1.5px solid var(--bdr);border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;font-weight:500;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);transition:all .15s;width:100%;justify-content:center;}
.btn-google:hover{border-color:var(--acc);color:var(--acc);}

/* HEADER */
.hdr{background:linear-gradient(135deg,#525f7f,#6b7aaa);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.18);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr h1{font-size:1.1rem;font-weight:600;}
.hdr p{font-size:.68rem;opacity:.7;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.user-pill{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:.7rem;}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:#fff;padding:3px 10px;border-radius:5px;font-size:.7rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.btn-logout:hover{background:rgba(255,255,255,.2);}

/* TABS */
.tabs{background:#fff;border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;gap:0;}
.tab{padding:10px 18px;font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.tab:hover{color:var(--acc);}

/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px 24px 0;}
.kpi{background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:10px 14px;}
.kpi-val{font-size:1.4rem;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.kpi-lbl{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 24px 0;}
.chart-card{background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:12px 14px;}
.chart-title{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}

/* GANTT */
.gantt-wrap{padding:8px 24px 0;}
.gantt-card{background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:12px 14px;overflow-x:auto;}
.gantt-title{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.gantt-table{width:100%;min-width:700px;border-collapse:collapse;}
.gantt-table th{font-size:.63rem;color:var(--muted);font-weight:600;padding:3px 6px;border-bottom:1px solid var(--bdr);white-space:nowrap;}
.gantt-table td{padding:4px 6px;border-bottom:1px solid #f0f3f7;vertical-align:middle;}
.gantt-bar-cell{position:relative;height:20px;}
.gantt-bar{position:absolute;height:14px;top:3px;border-radius:3px;min-width:4px;}
.gantt-today{position:absolute;top:0;bottom:0;width:1.5px;background:var(--red);opacity:.6;z-index:2;}

/* TOOLBAR */
.tb{padding:8px 24px 0;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tb input,.tb select{height:30px;padding:0 9px;border:1px solid var(--bdr);border-radius:6px;font-size:.78rem;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);background:#fff;outline:none;}
.tb input{flex:1;min-width:140px;}
.tb input:focus,.tb select:focus{border-color:var(--acc);}
.btn{height:30px;padding:0 12px;border-radius:6px;border:1px solid var(--bdr);background:#fff;color:var(--txt);font-size:.78rem;font-family:'IBM Plex Sans',sans-serif;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn-p{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-p:hover{background:#1a5fa8;color:#fff;}
.btn-g{background:var(--grn);color:#fff;border-color:var(--grn);}
.btn-g:hover{background:#147a37;color:#fff;}

/* TASK LIST */
.task-wrap{padding:8px 24px 24px;display:flex;flex-direction:column;gap:9px;}
.task-card{background:#fff;border:1px solid var(--bdr);border-left:3px solid var(--bdr);border-radius:10px;padding:11px 14px;display:flex;gap:9px;align-items:flex-start;transition:opacity .2s,border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(30,45,61,.06);}
.task-card:hover{border-color:#b0bfd0;box-shadow:0 3px 10px rgba(30,45,61,.11);}
.task-card.pa-Alta{border-left-color:var(--red);}
.task-card.pa-Media{border-left-color:var(--ylw);}
.task-card.pa-Baja{border-left-color:var(--grn);}
.task-card.done{opacity:.4;}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted);}
.task-check{width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:var(--acc);}
.task-body{flex:1;min-width:0;}
.task-title{font-size:.83rem;font-weight:500;}
.task-note{font-size:.72rem;color:var(--muted);margin-top:2px;line-height:1.4;}
.task-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center;}
.task-progress{margin-top:5px;display:flex;align-items:center;gap:7px;}
.prog-bg{flex:1;height:5px;background:#eef1f5;border-radius:3px;overflow:hidden;}
.prog-fg{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,#e9c46a,#2a9d8f);}
.prog-lbl{font-size:.68rem;font-family:'IBM Plex Mono',monospace;color:var(--muted);min-width:28px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600;white-space:nowrap;}
.p-Alta{background:var(--red-bg);color:var(--red);}
.p-Media{background:var(--ylw-bg);color:var(--ylw);}
.p-Baja{background:var(--grn-bg);color:var(--grn);}
.b-area{background:#e8f1fb;color:#1a5fa8;}
.b-resp{background:var(--pur-bg);color:var(--pur);}
.date-badge{background:#f0f3f7;color:var(--muted);padding:2px 7px;border-radius:20px;font-size:.65rem;font-family:'IBM Plex Mono',monospace;}
.date-vencida{background:var(--red-bg);color:var(--red);}
.task-actions{display:flex;gap:2px;flex-shrink:0;}
.ic-btn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;}
.ic-btn:hover{background:#eef1f5;color:var(--acc);}
.ic-btn.del:hover{background:var(--red-bg);color:var(--red);}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:.82rem;}
.history-wrap{margin-top:6px;border-top:1px solid #eef1f5;padding-top:5px;}
.history-toggle{font-size:.68rem;color:var(--acc);cursor:pointer;background:none;border:none;padding:0;font-family:'IBM Plex Sans',sans-serif;display:inline-flex;align-items:center;gap:3px;}
.history-toggle:hover{text-decoration:underline;}
.history-list{margin-top:5px;flex-direction:column;gap:3px;display:none;}
.history-list.open{display:flex;}
.history-item{font-size:.67rem;color:var(--muted);display:flex;gap:6px;align-items:baseline;padding:3px 7px;background:#f8fafc;border-radius:4px;line-height:1.5;}
.history-item .h-who{font-weight:600;color:var(--txt);white-space:nowrap;}
.history-item .h-time{white-space:nowrap;color:#b0bcc8;font-size:.63rem;}
.history-item .h-changes{flex:1;}
.last-update{font-size:.67rem;color:#b0bcc8;margin-top:3px;display:flex;align-items:center;gap:4px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;border:1px solid var(--bdr);padding:18px 20px;width:100%;max-width:520px;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:.92rem;font-weight:600;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:9px;}
.field label{font-size:.67rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{padding:6px 9px;border:1px solid var(--bdr);border-radius:6px;font-size:.8rem;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);outline:none;background:#fff;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field textarea{resize:vertical;min-height:60px;line-height:1.5;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.modal-footer{display:flex;justify-content:flex-end;gap:7px;margin-top:12px;}
.range-wrap{display:flex;align-items:center;gap:8px;}
.range-wrap input[type=range]{flex:1;}
.range-val{font-size:.78rem;font-family:'IBM Plex Mono',monospace;min-width:32px;}

/* AREA MODAL */
.area-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.area-chip{display:inline-flex;align-items:center;gap:4px;background:#e8f1fb;color:#1a5fa8;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:500;}
.area-chip button{border:none;background:transparent;color:#1a5fa8;cursor:pointer;font-size:.8rem;padding:0;line-height:1;}
.area-chip button:hover{color:var(--red);}
.area-add-row{display:flex;gap:6px;}
.area-add-row input{flex:1;padding:6px 9px;border:1px solid var(--bdr);border-radius:6px;font-size:.8rem;font-family:'IBM Plex Sans',sans-serif;outline:none;}
.area-add-row input:focus{border-color:var(--acc);}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--pri);color:#fff;padding:9px 14px;border-radius:7px;font-size:.8rem;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.25);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}

/* LOADING */
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* BAR CHART */
.bar-h-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.bar-h-lbl{font-size:.72rem;min-width:70px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-h-bg{flex:1;height:7px;background:#eef1f5;border-radius:4px;overflow:hidden;}
.bar-h-fg{height:100%;border-radius:4px;}
.bar-h-cnt{font-size:.72rem;font-family:'IBM Plex Mono',monospace;min-width:16px;text-align:right;}

.view-content{display:none;}
.view-content.active{display:block;}

/* RECURRENTES */
.rec-wrap{padding:14px 24px 24px;}
.rec-section-title{font-size:.78rem;font-weight:600;color:var(--pri);margin-bottom:6px;margin-top:14px;display:flex;align-items:center;gap:6px;}
.rec-section-title:first-child{margin-top:0;}
.rec-group{display:flex;flex-direction:column;gap:5px;}
.rec-card{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:7px 14px;display:flex;align-items:center;gap:14px;}
.rec-info{flex:1;min-width:150px;}
.rec-title{font-size:.8rem;font-weight:500;line-height:1.2;}
.rec-sub{font-size:.66rem;color:var(--muted);margin-top:1px;}
.rec-grid{display:flex;gap:6px;}
.rec-pct{font-size:.95rem;font-weight:700;font-family:'IBM Plex Mono',monospace;display:flex;flex-direction:column;align-items:flex-end;line-height:1;min-width:52px;}
.rec-pct-lbl{font-size:.54rem;font-weight:500;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.rec-actions{display:flex;gap:2px;flex-shrink:0;}
.rc-cell{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;user-select:none;}
.rc-cell.future{cursor:default;}
.rc-d{font-size:.57rem;color:var(--muted);}
.rc-box{width:23px;height:23px;border:1.5px solid #cbd5e1;border-radius:5px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;transition:all .12s;}
.rc-cell:not(.future):hover .rc-box{border-color:var(--acc);}
.rc-cell.done .rc-box{background:var(--grn);border-color:var(--grn);}
.rc-cell.today .rc-box{border-color:var(--ylw);box-shadow:0 0 0 1.5px rgba(201,136,10,.35);}
.rc-cell.miss .rc-box{border-color:#e4c6c6;}
.rc-cell.future .rc-box{background:#f4f6f9;border-color:#e8edf3;}
</style>
</head>
<body>

<div class="loading" id="view-loading">
  <div class="spinner"></div>
  <span style="font-size:.78rem">Cargando...</span>
</div>

<div id="view-login" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div style="font-size:2.2rem;margin-bottom:8px">📋</div>
      <h1>Seguimiento Actividades</h1>
      <p>TCL Logistics · Inicia sesión para continuar</p>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Iniciar sesión con Google
      </button>
    </div>
  </div>
</div>

<div id="view-app" style="display:none">
  <div class="hdr">
    <div class="hdr-left">
      <span style="font-size:1.6rem">📋</span>
      <div><h1>Seguimiento Actividades</h1><p>TCL Logistics</p></div>
    </div>
    <div class="hdr-right">
      <div class="user-pill">👤 <span id="user-name"></span></div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
    <div class="tab" onclick="switchTab('tareas')">📋 Tareas</div>
    <div class="tab" onclick="switchTab('recurrentes')">🔁 Recurrentes</div>
  </div>

  <!-- DASHBOARD -->
  <div class="view-content active" id="tab-dashboard">
    <div class="tb" style="padding-top:10px;">
      <select id="dash-filter-resp" style="min-width:160px;"><option value="">Todos los responsables</option></select>
      <select id="dash-filter-area" style="min-width:140px;"><option value="">Todas las áreas</option></select>
      <select id="dash-filter-pri" style="min-width:160px;">
        <option value="">Todas las prioridades</option>
        <option>Alta</option><option>Media</option><option>Baja</option>
      </select>
      <select id="dash-filter-est" style="min-width:140px;">
        <option value="">Todos los estados</option>
        <option value="pending">Pendientes</option>
        <option value="done">Completadas</option>
        <option value="vencida">Vencidas</option>
      </select>
    </div>
    <div class="kpi-row" id="kpi-row"></div>
    <div class="charts-row" id="charts-row" style="grid-template-columns:repeat(4,1fr);"></div>
    <div class="charts-row" id="ontime-row" style="grid-template-columns:1fr;"></div>
    <div class="gantt-wrap">
      <div class="gantt-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
          <div class="gantt-title" style="margin-bottom:0;">Cronograma de tareas</div>
          <select id="dash-sort" style="height:28px;padding:0 8px;border:1px solid var(--bdr);border-radius:6px;font-size:.74rem;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);background:#fff;outline:none;">
            <option value="date-asc">Ordenar: Límite ↑ (más cercana)</option>
            <option value="date-desc">Ordenar: Límite ↓ (más lejana)</option>
            <option value="start-asc">Ordenar: Inicio ↑</option>
            <option value="prog-desc">Ordenar: Avance ↓</option>
            <option value="prog-asc">Ordenar: Avance ↑</option>
            <option value="pri">Ordenar: Prioridad (Alta→Baja)</option>
            <option value="resp">Ordenar: Responsable (A-Z)</option>
          </select>
        </div>
        <div id="gantt-container"></div>
      </div>
    </div>
  </div>

  <!-- TAREAS -->
  <div class="view-content" id="tab-tareas">
    <div class="tb">
      <input type="text" id="search" placeholder="🔍 Buscar tarea...">
      <select id="filter-pri"><option value="">Todas las prioridades</option><option>Alta</option><option>Media</option><option>Baja</option></select>
      <select id="filter-area"><option value="">Todas las áreas</option></select>
      <select id="filter-resp"><option value="">Todos los responsables</option></select>
      <select id="filter-est"><option value="">Todos los estados</option><option value="pending">Pendientes</option><option value="done">Completadas</option></select>
      <button class="btn btn-p" onclick="openModal()">➕ Nueva tarea</button>
      <button class="btn" onclick="openAreaModal()">🏷️ Áreas</button>
      <button class="btn btn-g" onclick="exportExcel()">⬇️ Excel</button>
    </div>
    <div class="task-wrap" id="task-list"></div>
  </div>

  <!-- RECURRENTES -->
  <div class="view-content" id="tab-recurrentes">
    <div class="tb" style="padding-top:14px;">
      <input type="text" id="rec-search" placeholder="🔍 Buscar por actividad, responsable o área...">
      <select id="rec-filter-pri"><option value="">Todas las prioridades</option><option>Alta</option><option>Media</option><option>Baja</option></select>
      <select id="rec-filter-area"><option value="">Todas las áreas</option></select>
      <select id="rec-filter-resp"><option value="">Todos los responsables</option></select>
      <select id="rec-filter-cumpl">
        <option value="">Todo cumplimiento</option>
        <option value="low">Bajo (&lt;50%)</option>
        <option value="mid">Medio (50–79%)</option>
        <option value="high">Alto (≥80%)</option>
      </select>
    </div>
    <div class="rec-wrap" id="recurrentes-list" style="padding-top:8px;"></div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Nueva tarea</h3>
    <div class="field"><label>Título *</label><input id="f-title" placeholder="Descripción breve..."></div>
    <div class="field"><label>Notas</label><textarea id="f-note" placeholder="Detalles, contexto..."></textarea></div>
    <div class="field-row">
      <div class="field"><label>Prioridad</label><select id="f-pri"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div>
      <div class="field"><label>Área</label><select id="f-area"><option value="">Sin área</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Responsable</label><input id="f-resp" placeholder="Nombre o correo..."></div>
      <div class="field"><label>Frecuencia</label>
        <select id="f-freq">
          <option value="">Sin frecuencia</option>
          <option>Única vez</option>
          <option>Diaria</option>

// ── RECURRENTES ────────────────────────────────────────────────────────────
function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=(day===0?-6:1)-day;
  dt.setDate(dt.getDate()+diff);
  return dt.toISOString().slice(0,10);
}

// Una tarea es recurrente si tiene una frecuencia que se repite (diaria en adelante)
const FREQ_RECURRENTES=['Diaria','Semanal','Quincenal','Mensual','Anual'];
function isRecurrente(t){ return FREQ_RECURRENTES.includes(t.freq); }

// Clave de periodo según frecuencia (debe coincidir con las claves guardadas en completions)
function periodKeyFor(freq, d){
  if(freq==='Semanal') return getMonday(d);
  if(freq==='Quincenal'){const m=String(d.getMonth()+1).padStart(2,'0');return `${d.getFullYear()}-${m}-Q${d.getDate()<=15?1:2}`;}
  if(freq==='Mensual') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if(freq==='Anual') return `${d.getFullYear()}`;
  return d.toISOString().slice(0,10); // Diaria / default
}

// Generadores de periodos visibles (más antiguo → actual)
function periodsQuincenal(){
  const arr=[]; const now=new Date();
  let y=now.getFullYear(), m=now.getMonth(), q=now.getDate()<=15?1:2;
  for(let i=0;i<6;i++){
    arr.unshift({key:`${y}-${String(m+1).padStart(2,'0')}-Q${q}`, label:`${String(m+1).padStart(2,'0')}/Q${q}`});
    if(q===2){q=1;} else {q=2;m--;if(m<0){m=11;y--;}}
  }
  return arr;
}
function periodsMonthly(){
  const names=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const now=new Date(); const arr=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);arr.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:names[d.getMonth()]});}
  return arr;
}
function periodsYearly(){
  const y=new Date().getFullYear(); const arr=[];
  for(let i=2;i>=0;i--) arr.push({key:`${y-i}`, label:`${y-i}`});
  return arr;
}

// Construye las celdas (checkbox) y el % de cumplimiento para un set de periodos
function buildPeriodCells(t, periods){
  const createdKey = t.createdAt ? periodKeyFor(t.freq, new Date(t.createdAt)) : periods[0].key;
  const curKey = periods[periods.length-1].key;
  let completed=0, total=0;
  const cells=periods.map(p=>{
    const done=(t.completions||[]).includes(p.key);
    let cls;
    if(p.key<createdKey || p.key>curKey) cls='future';
    else if(p.key<curKey){cls=done?'done':'miss';total++;if(done)completed++;}
    else {cls=done?'done':'today';total++;if(done)completed++;}
    const clickable=(cls!=='future')?` onclick="toggleCompletion('${t.id}','${p.key}')"`:'';
    return `<div class="rc-cell ${cls}"${clickable}><div class="rc-d">${p.label}</div><div class="rc-box">${done?'✓':''}</div></div>`;
  }).join('');
  return {cells, pct: total?Math.round(completed/total*100):0};
}

function renderRecurrentes(){
  const el=document.getElementById('recurrentes-list');
  if(!el) return;
  const q=(document.getElementById('rec-search')?.value||'').toLowerCase().trim();
  const fp=document.getElementById('rec-filter-pri')?.value||'';
  const fa=document.getElementById('rec-filter-area')?.value||'';
  const fr=document.getElementById('rec-filter-resp')?.value||'';
  const fc=document.getElementById('rec-filter-cumpl')?.value||'';
  const inBand=pct=> !fc || (fc==='low'?pct<50 : fc==='mid'?(pct>=50&&pct<80) : pct>=80);
  const match=t=>{
    if(q && ![t.title,t.resp,t.area].some(v=>(v||'').toLowerCase().includes(q))) return false;
    if(fp && t.pri!==fp) return false;
    if(fa && t.area!==fa) return false;
    if(fr && t.resp!==fr) return false;
    return true;
  };
  const todayStr=today();
  const todayD=new Date(todayStr);
  const dayNames=['L','M','M','J','V','S','D'];

  const buildDaily=(t)=>{
    const monday=getMonday(todayD);
    const cells=[];
    const monthStart=todayStr.slice(0,7)+'-01';
    const createdStr0 = t.createdAt ? new Date(t.createdAt).toISOString().slice(0,10) : todayStr;
    const countStart = createdStr0>monthStart?createdStr0:monthStart;
    let completedThisMonth=0;
    (t.completions||[]).forEach(c=>{ if(c>=countStart && c<=todayStr) completedThisMonth++; });
    const elapsed=Math.max(1, Math.round((todayD-new Date(countStart))/86400000)+1);
    const pct=Math.round(completedThisMonth/elapsed*100);
    const createdStr = t.createdAt ? new Date(t.createdAt).toISOString().slice(0,10) : todayStr;
    for(let i=0;i<7;i++){
      const d=new Date(monday); d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      const done=(t.completions||[]).includes(ds);
      let cls;
      if(ds<createdStr) cls='future';
      else if(ds<todayStr) cls=done?'done':'miss';
      else if(ds===todayStr) cls=done?'done':'today';
      else cls='future';
      const clickable=ds<=todayStr?` onclick="toggleCompletion('${t.id}','${ds}')"`:'';
      cells.push(`<div class="rc-cell ${cls}"${clickable}><div class="rc-d">${dayNames[i]}</div><div class="rc-box">${done?'✓':''}</div></div>`);
    }
    return {cells:cells.join(''), pct};
  };

  const buildWeekly=(t)=>{
    const curMonday=getMonday(todayD);
    const createdMonday = t.createdAt ? getMonday(new Date(t.createdAt)) : curMonday;
    let completedCount=0, totalCount=0;
    const cells=[];
    for(let i=5;i>=0;i--){
      const d=new Date(curMonday); d.setDate(d.getDate()-7*i);
      const ws=d.toISOString().slice(0,10);
      const done=(t.completions||[]).includes(ws);
      let cls;
      if(ws<createdMonday) cls='future';
      else if(ws<curMonday){ cls=done?'done':'miss'; totalCount++; if(done) completedCount++; }
      else if(ws===curMonday){ cls=done?'done':'today'; totalCount++; if(done) completedCount++; }
      else cls='future';
      const clickable=cls!=='future'?` onclick="toggleCompletion('${t.id}','${ws}')"`:'';
      cells.push(`<div class="rc-cell ${cls}"${clickable}><div class="rc-d">${ws.slice(5).replace('-','/')}</div><div class="rc-box">${done?'✓':''}</div></div>`);
    }
    const pct=totalCount>0?Math.round(completedCount/totalCount*100):0;
    return {cells:cells.join(''), pct};
  };

  // Filtra (texto/pri/área/resp), construye celdas+pct, filtra por banda de cumplimiento y ordena por responsable
  const buildList=(arr, builder)=>arr.filter(match)
    .map(t=>({t, built:builder(t)}))
    .filter(x=>inBand(x.built.pct))
    .sort((a,b)=>(a.t.resp||'~').localeCompare(b.t.resp||'~')||(a.t.title||'').localeCompare(b.t.title||''));

  const renderGroup=(items)=>{
    return items.map(({t,built})=>{
      const {cells,pct}=built;
      const pctColor=pct>=80?'var(--grn)':pct>=50?'var(--ylw)':'var(--red)';
      const titleEsc=(t.title||'').replace(/</g,'&lt;');
      const sub=`${t.resp?'👤 '+t.resp:''}${t.area?(t.resp?' · ':'')+t.area:''}`;
      const titleAttr=titleEsc.replace(/'/g,"\\'");
      return `<div class="rec-card">
        <div class="rec-info">
          <div class="rec-title">${titleEsc}</div>
          ${sub?`<div class="rec-sub">${sub}</div>`:''}
        </div>
        <div class="rec-grid">${cells}</div>
        <div class="rec-pct" style="color:${pctColor}">${pct}%<span class="rec-pct-lbl">cumplim.</span></div>
        <div class="rec-actions">
          <button class="ic-btn" onclick="openModal('${t.id}')" title="Editar">✏️</button>
          <button class="ic-btn del" onclick="deleteTask('${t.id}','${titleAttr}')" title="Eliminar">🗑️</button>
        </div>
      </div>`;
    }).join('');
  };

  const groups=[
    {title:'📆 Diarias',     items:buildList(tasks.filter(t=>t.freq==='Diaria'),    buildDaily)},
    {title:'🗓️ Semanales',   items:buildList(tasks.filter(t=>t.freq==='Semanal'),   buildWeekly)},
    {title:'📅 Quincenales', items:buildList(tasks.filter(t=>t.freq==='Quincenal'), t=>buildPeriodCells(t,periodsQuincenal()))},
    {title:'📆 Mensuales',   items:buildList(tasks.filter(t=>t.freq==='Mensual'),   t=>buildPeriodCells(t,periodsMonthly()))},
    {title:'🗓️ Anuales',     items:buildList(tasks.filter(t=>t.freq==='Anual'),     t=>buildPeriodCells(t,periodsYearly()))},
  ];
  const html=groups.filter(g=>g.items.length).map(g=>
    `<div class="rec-section-title">${g.title}</div><div class="rec-group">${renderGroup(g.items)}</div>`
  ).join('');
  el.innerHTML = html || ((q||fp||fa||fr||fc)
    ? '<div class="empty">🔍 No hay recurrentes que coincidan con los filtros.</div>'
    : '<div class="empty">📭 No hay tareas recurrentes. Asigna una frecuencia (Diaria, Semanal, Quincenal, Mensual o Anual) a una tarea para verla aquí.</div>');
}

function checkAlerts() {
  if(!currentUser) return;
  const userEmail = currentUser.email;
  const userName = currentUser.displayName || '';

  // Buscar tareas del usuario por email o nombre
  const misTareas = tasks.filter(t => !t.done && !isRecurrente(t) && t.resp && (
    t.resp.toLowerCase() === userEmail.toLowerCase() ||
    t.resp.toLowerCase() === userName.toLowerCase() ||
    userName.toLowerCase().includes(t.resp.toLowerCase()) ||
    t.resp.toLowerCase().includes(userName.toLowerCase().split(' ')[0])
  ));

  if(!misTareas.length) return;

  const todayStr = today();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomorrowStr = tom.toISOString().slice(0,10);
  const in2 = new Date(); in2.setDate(in2.getDate()+2);
  const in2Str = in2.toISOString().slice(0,10);

  const vencidas = misTareas.filter(t => t.date && t.date < todayStr);
  const hoy = misTareas.filter(t => t.date === todayStr);
  const proximas = misTareas.filter(t => t.date === tomorrowStr || t.date === in2Str);

  if(!vencidas.length && !hoy.length && !proximas.length) return;

  const makeList = (items, color, icon) => items.map(t =>
    `<div style="display:flex;align-items:center;gap:7px;padding:5px 8px;background:${color};border-radius:6px;margin-bottom:4px;font-size:.78rem;">
      <span>${icon}</span>
      <div>
        <div style="font-weight:500">${t.title}</div>
        <div style="font-size:.68rem;opacity:.7">${t.date ? '📅 '+t.date.slice(5).replace('-','/') : ''} ${t.area ? '· '+t.area : ''}</div>
      </div>
    </div>`
  ).join('');

  let vencHtml = '', proxHtml = '';
  if(vencidas.length || hoy.length){
    vencHtml = `<div style="font-size:.72rem;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;">⚠️ Vencidas / Vencen hoy (${vencidas.length+hoy.length})</div>`;
    vencHtml += makeList(vencidas,'#fdecea','🔴');
    vencHtml += makeList(hoy,'#fff3cd','🟡');
  }
  if(proximas.length){
    proxHtml = `<div style="font-size:.72rem;font-weight:600;color:var(--ylw);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;margin-top:${vencidas.length||hoy.length?'10px':'0'};">📅 Próximas (${proximas.length})</div>`;
    proxHtml += makeList(proximas,'#e8f1fb','🔵');
  }

  document.getElementById('alert-vencidas').innerHTML = vencHtml;
  document.getElementById('alert-proximas').innerHTML = proxHtml;
  document.getElementById('alert-modal-bg').classList.add('open');
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function isVencida(d){return d && d<today();}

// Fecha local (YYYY-MM-DD) a partir de un timestamp
function toDateStr(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
// Momento real de cierre: campo completedAt, o se deriva del historial (retroactivo)
function getCompletedAt(t){
  if(t.completedAt) return t.completedAt;
  const h=(t.history||[]).filter(x=>x.changes&&x.changes.includes('→ Completada'));
  return h.length?h[h.length-1].at:null;
}
// 'on' = cerrada en tiempo · 'late' = fuera de tiempo · null = no evaluable
function onTimeStatus(t){
  if(!t.done||!t.date) return null;
  const ca=getCompletedAt(t);
  if(!ca) return null;
  return toDateStr(ca)<=t.date ? 'on' : 'late';
}

    const prev=el.value;
    el.innerHTML='<option value="">Todos los responsables</option>'+resps.map(r=>`<option value="${r}"${prev===r?' selected':''}>${r}</option>`).join('');
  });
}

function getDashTasks(){
  const fr=document.getElementById('dash-filter-resp').value;
  const fa=document.getElementById('dash-filter-area').value;
  const fp=document.getElementById('dash-filter-pri').value;
  const fe=document.getElementById('dash-filter-est').value;
  return tasks.filter(t=>{
    if(isRecurrente(t)) return false;
    if(fr&&t.resp!==fr) return false;
    if(fa&&t.area!==fa) return false;
    if(fp&&t.pri!==fp) return false;
    if(fe==='pending'&&t.done) return false;
    if(fe==='done'&&!t.done) return false;
    if(fe==='vencida'&&(!isVencida(t.date)||t.done)) return false;
    return true;
  });
}

function renderKPIs(){
  const src=getDashTasks();
  const total=src.length, done=src.filter(t=>t.done).length;
  const pend=total-done, venc=src.filter(t=>!t.done&&isVencida(t.date)).length;
  const avgProg=total>0?Math.round(src.reduce((s,t)=>s+(t.progress||0),0)/total):0;
  const evaluables=src.filter(t=>onTimeStatus(t)!==null);
  const onTime=evaluables.filter(t=>onTimeStatus(t)==='on').length;
  const onTimePct=evaluables.length?Math.round(onTime/evaluables.length*100):0;
  const otColor=onTimePct>=80?'var(--grn)':onTimePct>=50?'var(--ylw)':'var(--red)';
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">Total tareas</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--grn)">${done}</div><div class="kpi-lbl">Completadas</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--acc)">${pend}</div><div class="kpi-lbl">Pendientes</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--red)">${venc}</div><div class="kpi-lbl">Vencidas</div></div>

}

function renderCharts(){
  const src=getDashTasks();

  const done=src.filter(t=>t.done).length;

  const venc=src.filter(t=>!t.done&&isVencida(t.date)).length;
  const total=src.length||1;
  const statusData=[{l:'Completadas',v:done,c:'var(--grn)'},{l:'Pendientes',v:pend,c:'var(--acc)'},{l:'Vencidas',v:venc,c:'var(--red)'}];
  const donut1=buildDonut(statusData,total);

  // Chart 2: Prioridad
  const pris=[{l:'Alta',c:'var(--red)'},{l:'Media',c:'var(--ylw)'},{l:'Baja',c:'var(--grn)'}];
  const priData=pris.map(p=>({l:p.l,v:src.filter(t=>t.pri===p.l).length,c:p.c}));
  const donut2=buildDonut(priData,src.length||1);

  // Chart 3: Actividades por área (apilado por estado + total)
  const areaMap={};
  src.filter(t=>t.area).forEach(t=>{
    if(!areaMap[t.area]) areaMap[t.area]={done:0,pend:0,venc:0,total:0};
    if(t.done) areaMap[t.area].done++;
    else if(isVencida(t.date)) areaMap[t.area].venc++;
    else areaMap[t.area].pend++;
    areaMap[t.area].total++;
  });
  const areaEntries=Object.entries(areaMap).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  const maxA=Math.max(...areaEntries.map(e=>e[1].total),1);
  const aseg=(v,g)=>g.total?(v/g.total*100):0;
  const areaBars=areaEntries.length?areaEntries.map(([a,g])=>`
    <div class="bar-h-row">
      <span class="bar-h-lbl" title="${a}">${a}</span>
      <div class="bar-h-bg" style="height:12px;">
        <div style="width:${Math.round(g.total/maxA*100)}%;height:100%;display:flex;">
          <div style="width:${aseg(g.done,g)}%;background:var(--grn)" title="Completadas: ${g.done}"></div>
          <div style="width:${aseg(g.pend,g)}%;background:var(--acc)" title="Pendientes: ${g.pend}"></div>
          <div style="width:${aseg(g.venc,g)}%;background:var(--red)" title="Vencidas: ${g.venc}"></div>
        </div>
      </div>
      <span class="bar-h-cnt">${g.total}</span>
    </div>
    <div style="font-size:.62rem;margin:-2px 0 7px 77px;display:flex;gap:9px;">
      <span style="color:var(--grn)">✓ ${g.done}</span>
      <span style="color:var(--acc)">⏳ ${g.pend}</span>
      <span style="color:var(--red)">⚠ ${g.venc}</span>
    </div>`).join(''):'<div style="color:var(--muted);font-size:.75rem">Sin datos</div>';
  const areaLegend=areaEntries.length?`<div style="display:flex;gap:12px;margin-top:2px;font-size:.66rem;color:var(--muted)">
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--grn);margin-right:4px;vertical-align:middle"></span>Completadas</span>
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--acc);margin-right:4px;vertical-align:middle"></span>Pendientes</span>
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--red);margin-right:4px;vertical-align:middle"></span>Vencidas</span>
  </div>`:'';

  document.getElementById('charts-row').innerHTML=`
    <div class="chart-card"><div class="chart-title">Estado de tareas</div>${donut1}</div>
    <div class="chart-card"><div class="chart-title">Distribución por prioridad</div>${donut2}</div>
    <div class="chart-card"><div class="chart-title">Actividades por área</div>${areaBars}${areaLegend}</div>
    <div class="chart-card"><div class="chart-title">Tareas por responsable</div><div id="resp-inner"></div></div>`;
}

function buildDonut(data, total){
  const r=36,cx=46,cy=46,circ=2*Math.PI*r;
  let offset=0;
  const segs=data.map(d=>{
    const pct=d.v/total;
    const dash=circ*pct, gap=circ*(1-pct);
    const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="12"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(-offset*circ).toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
    return seg;
  }).join('');
  const legend=data.map(d=>`<div class="leg-item"><div class="leg-dot" style="background:${d.c}"></div>${d.l}: <strong>${d.v}</strong></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:12px;">
    <svg width="92" height="92" viewBox="0 0 92 92">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef1f5" stroke-width="12"/>
      ${segs}
    </svg>
    <div style="display:flex;flex-direction:column;gap:4px;font-size:.72rem;color:var(--muted)">${legend}</div>
  </div>`;
}

function renderOnTime(){
  const src=getDashTasks();
  const evaluables=src.filter(t=>onTimeStatus(t)!==null);
  const onTime=evaluables.filter(t=>onTimeStatus(t)==='on').length;
  const late=evaluables.length-onTime;
  const completedTotal=src.filter(t=>t.done).length;
  const noDate=completedTotal-evaluables.length; // completadas sin fecha límite o sin fecha de cierre
  const pct=evaluables.length?Math.round(onTime/evaluables.length*100):0;
  const pctColor=pct>=80?'var(--grn)':pct>=50?'var(--ylw)':'var(--red)';
  const donut=buildDonut([
    {l:'En tiempo',v:onTime,c:'var(--grn)'},
    {l:'Fuera de tiempo',v:late,c:'var(--red)'}
  ], evaluables.length||1);
  // Desglose por responsable
  const byResp={};
  evaluables.forEach(t=>{const r=t.resp||'Sin asignar'; if(!byResp[r])byResp[r]={on:0,total:0}; byResp[r].total++; if(onTimeStatus(t)==='on')byResp[r].on++;});
  const respRows=Object.entries(byResp).sort((a,b)=>b[1].total-a[1].total).map(([r,g])=>{
    const p=Math.round(g.on/g.total*100);
    const c=p>=80?'var(--grn)':p>=50?'var(--ylw)':'var(--red)';
    return `<div class="bar-h-row">
      <span class="bar-h-lbl" title="${r}">${r}</span>
      <div class="bar-h-bg"><div class="bar-h-fg" style="width:${p}%;background:${c}"></div></div>
      <span class="bar-h-cnt">${p}%</span>
    </div>
    <div style="font-size:.6rem;color:#b0bcc8;margin:-2px 0 6px 77px;">${g.on}/${g.total} en tiempo</div>`;
  }).join('');
  const body=evaluables.length?`
    <div style="display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start;">
      <div style="display:flex;align-items:center;gap:22px;">
        ${donut}
        <div style="display:flex;flex-direction:column;gap:5px;">
          <div style="font-size:1.9rem;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${pctColor};line-height:1">${pct}%</div>
          <div style="font-size:.7rem;color:var(--muted)">de las tareas cerradas se completaron en tiempo</div>
          <div style="font-size:.74rem;margin-top:4px;">
            <span style="color:var(--grn)">● En tiempo: <strong>${onTime}</strong></span>&nbsp;&nbsp;
            <span style="color:var(--red)">● Fuera de tiempo: <strong>${late}</strong></span>
          </div>
          <div style="font-size:.66rem;color:#b0bcc8;">Evaluadas ${evaluables.length} de ${completedTotal} completadas${noDate>0?` · ${noDate} sin fecha límite/cierre`:''}</div>
        </div>
      </div>
      <div style="flex:1;min-width:240px;">
        <div style="font-size:.66rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;">% En tiempo por responsable</div>
        ${respRows}
      </div>
    </div>`:'<div style="color:var(--muted);font-size:.75rem">Aún no hay tareas completadas con fecha límite para evaluar.</div>';
  document.getElementById('ontime-row').innerHTML=`<div class="chart-card"><div class="chart-title">Cumplimiento de deadline (tareas cerradas)</div>${body}</div>`;
}

function renderGantt(){
  const sortBy=document.getElementById('dash-sort')?.value||'date-asc';
  const priO={Alta:0,Media:1,Baja:2};
  const cmp={
    'date-asc':(a,b)=>a.date.localeCompare(b.date),
    'date-desc':(a,b)=>b.date.localeCompare(a.date),
    'start-asc':(a,b)=>(a.startDate||'').localeCompare(b.startDate||''),
    'prog-desc':(a,b)=>(b.progress||0)-(a.progress||0),
    'prog-asc':(a,b)=>(a.progress||0)-(b.progress||0),
    'pri':(a,b)=>((priO[a.pri]??9)-(priO[b.pri]??9))||a.date.localeCompare(b.date),
    'resp':(a,b)=>((a.resp||'~').localeCompare(b.resp||'~'))||a.date.localeCompare(b.date),
  }[sortBy]||((a,b)=>a.date.localeCompare(b.date));
  const tWithDates=getDashTasks().filter(t=>t.startDate&&t.date&&t.freq!=='Diaria'&&t.freq!=='Semanal').sort(cmp).slice(0,15);
  if(!tWithDates.length){
    document.getElementById('gantt-container').innerHTML='<div style="color:var(--muted);font-size:.75rem;padding:8px 0">No hay tareas con fecha inicio y fecha límite definidas.</div>';
    return;
  }
  const allDates=tWithDates.flatMap(t=>[t.startDate,t.date]);
  let minD=new Date(allDates.reduce((a,b)=>a<b?a:b));
  let maxD=new Date(allDates.reduce((a,b)=>a>b?a:b));
  minD.setDate(minD.getDate()-2); maxD.setDate(maxD.getDate()+2);
  const span=(maxD-minD)/(1000*60*60*24);
  const todayD=new Date(today());
  const todayPct=Math.max(0,Math.min(100,((todayD-minD)/(maxD-minD))*100));

  const cols=[];
  let cur=new Date(minD);
  while(cur<=maxD){
    cols.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+Math.max(1,Math.floor(span/8)));
  }

  const priGradients={'Alta':'linear-gradient(90deg,#c8303a,#f4a0a0)','Media':'linear-gradient(90deg,#c9880a,#fde68a)','Baja':'linear-gradient(90deg,#19a34a,#a7f3c0)'};

  const rows=tWithDates.map(t=>{
    const s=new Date(t.startDate), e=new Date(t.date);
    const left=((s-minD)/(maxD-minD))*100;
    const width=Math.max(1,((e-s)/(maxD-minD))*100);
    const color=t.done?'linear-gradient(90deg,#aab4c0,#d5dae2)':(priGradients[t.pri]||'linear-gradient(90deg,#2d7dd2,#93c5fd)');
    return `<tr>
      <td style="font-size:.72rem;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;padding:3px 6px;" title="${t.title}">${t.title}</td>
      <td style="font-size:.65rem;color:var(--muted);white-space:nowrap;">${t.startDate.slice(5).replace('-','/')}</td>
      <td style="font-size:.65rem;color:var(--muted);white-space:nowrap;">${t.date.slice(5).replace('-','/')}</td>
      <td class="gantt-bar-cell" style="min-width:200px;position:relative;">
        <div class="gantt-today" style="left:${todayPct.toFixed(1)}%"></div>
        <div class="gantt-bar" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${color};opacity:${t.done?.6:1}" title="${t.title}: ${t.startDate} → ${t.date}"></div>
      </td>
      <td style="font-size:.65rem;font-family:'IBM Plex Mono',monospace;text-align:right;">${t.progress||0}%</td>
    </tr>`;
  }).join('');

  document.getElementById('gantt-container').innerHTML=`
    <table class="gantt-table">
      <thead><tr>
        <th style="min-width:140px">Tarea</th>
        <th>Inicio</th><th>Límite</th>
        <th>Cronograma</th>
        <th>Avance</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderList(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fp=document.getElementById('filter-pri').value;
  const fa=document.getElementById('filter-area').value;
  const fr=document.getElementById('filter-resp').value;
  const fe=document.getElementById('filter-est').value;
  let list=[...tasks].filter(t=>{
    if(isRecurrente(t)) return false;
    if(q&&!t.title.toLowerCase().includes(q)&&!(t.note||'').toLowerCase().includes(q)) return false;
    if(fp&&t.pri!==fp) return false;
    if(fa&&t.area!==fa) return false;
    if(fr&&t.resp!==fr) return false;
    if(fe==='pending'&&t.done) return false;
    if(fe==='done'&&!t.done) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const po={Alta:0,Media:1,Baja:2};
    if(po[a.pri]!==po[b.pri]) return po[a.pri]-po[b.pri];
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    if(a.date) return -1; if(b.date) return 1;
    return 0;
  });
  const el=document.getElementById('task-list');
  if(!list.length){el.innerHTML='<div class="empty">📭 No hay tareas que mostrar.</div>';return;}
  el.innerHTML=list.map(t=>{
    const venc=!t.done&&isVencida(t.date);
    const prog=t.progress||0;
    const progColor='';
    const dateLbl=t.date?`<span class="date-badge${venc?' date-vencida':''}">${venc?'⚠️ ':'📅 '}${t.date.slice(5).replace('-','/')}</span>`:'';
    const startLbl=t.startDate?`<span class="date-badge">🗓 ${t.startDate.slice(5).replace('-','/')}</span>`:'';
    const areaLbl=t.area?`<span class="badge b-area">${t.area}</span>`:'';
    const respLbl=t.resp?`<span class="badge b-resp">👤 ${t.resp}</span>`:'';
    const freqLbl=t.freq?`<span class="badge" style="background:#f0f3f7;color:var(--muted)">🔁 ${t.freq}</span>`:'';
    const titleEsc=(t.title||'').replace(/</g,'&lt;');
    const noteEsc=(t.note||'').replace(/</g,'&lt;');
    const history = t.history||[];
    const lastH = history.length ? history[history.length-1] : null;
    const fmtTime = ts => { const d=new Date(ts); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); };
    const lastUpdateHtml = lastH ? `<div class="last-update">🕐 ${lastH.who} · ${fmtTime(lastH.at)}</div>` : '';
    const historyItems = [...history].reverse().map((h,i)=>`
      <div class="history-item">
        <span class="h-who">${h.who}</span>
        <span class="h-time">${fmtTime(h.at)}</span>
        <span class="h-changes">${h.changes}</span>
      </div>`).join('');
    const historyHtml = history.length ? `
      <div class="history-wrap">
        <button class="history-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Ocultar historial':'▼ Ver historial (${history.length})'">▼ Ver historial (${history.length})</button>
        <div class="history-list">${historyItems}</div>
      </div>` : '';
    return `<div class="task-card${t.done?' done':''} pa-${t.pri}">
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${t.id}',${t.done})">
      <div class="task-body">
        <div class="task-title">${titleEsc}</div>
        ${t.note?`<div class="task-note">${noteEsc}</div>`:''}
        <div class="task-meta">
          <span class="badge p-${t.pri}">${t.pri}</span>
          ${areaLbl}${respLbl}${freqLbl}${startLbl}${dateLbl}
        </div>
        <div class="task-progress">
          <div class="prog-bg"><div class="prog-fg" style="width:${prog}%"></div></div>
          <span class="prog-lbl">${prog}%</span>
        </div>
        ${lastUpdateHtml}
        ${historyHtml}
      </div>
      <div class="task-actions">
        <button class="ic-btn" onclick="openModal('${t.id}')" title="Editar">✏️</button>
        <button class="ic-btn del" onclick="deleteTask('${t.id}','${titleEsc.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

window.openModal = (id=null) => {
  editId=id;
  const t=id?tasks.find(t=>t.id===id):null;
  document.getElementById('modal-title').textContent=id?'Editar tarea':'Nueva tarea';
  document.getElementById('f-title').value=t?t.title:'';
  document.getElementById('f-note').value=t?t.note||'':'';
  document.getElementById('f-pri').value=t?t.pri:'Media';
  document.getElementById('f-area').value=t?t.area||'':'';
  document.getElementById('f-resp').value=t?t.resp||'':'';
  document.getElementById('f-freq').value=t?t.freq||'':'';
  document.getElementById('f-start').value=t?t.startDate||'':'';
  document.getElementById('f-date').value=t?t.date||'':'';
  const prog=t?t.progress||0:0;
  document.getElementById('f-prog').value=prog;
  document.getElementById('f-prog-val').textContent=prog+'%';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
};

// ── EXPORT ─────────────────────────────────────────────────────────────────
// Carga SheetJS bajo demanda si el <script> del CDN no quedó disponible.
function loadSheetJS(){
  return new Promise((resolve,reject)=>{
    if(typeof XLSX!=='undefined') return resolve(XLSX);
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>resolve(typeof XLSX!=='undefined'?XLSX:null);
    s.onerror=()=>reject(new Error('No se pudo cargar SheetJS (CDN bloqueado)'));
    document.head.appendChild(s);
  });
}

window.exportExcel=async ()=>{
  try{
    const data=tasks.map(t=>{
      const ots=onTimeStatus(t); const ca=getCompletedAt(t);
      return {'Título':t.title,'Notas':t.note||'','Prioridad':t.pri,'Área':t.area||'','Responsable':t.resp||'','Frecuencia':t.freq||'','Fecha inicio':t.startDate||'','Fecha límite':t.date||'','% Avance':t.progress||0,'Estado':t.done?'Completada':'Pendiente','Vencida':!t.done&&isVencida(t.date)?'Sí':'No','Fecha cierre':ca?toDateStr(ca):'','Cumplimiento':ots==='on'?'En tiempo':ots==='late'?'Fuera de tiempo':''};
    });
    if(!data.length){showToast('No hay datos para exportar');return;}

    // 1) Intenta SheetJS (CDN principal o carga al vuelo desde alterno)
    let lib = (typeof XLSX!=='undefined') ? XLSX : null;
    if(!lib){
      try { lib = await loadSheetJS(); }
      catch(e){ console.warn('[export] SheetJS no disponible, uso CSV:', e); }
    }
    if(lib){
      try{
        const ws=lib.utils.json_to_sheet(data);
        ws['!cols']=[{wch:40},{wch:50},{wch:12},{wch:18},{wch:22},{wch:14},{wch:14},{wch:14},{wch:10},{wch:13},{wch:10},{wch:13},{wch:16}];
        const wb=lib.utils.book_new();
        lib.utils.book_append_sheet(wb,'Actividades',ws);
        lib.writeFile(wb,'Seguimiento_Actividades.xlsx');
        showToast('📥 Excel descargado');
        return;
      }catch(e){ console.error('[export] Falló XLSX, caigo a CSV:', e); }
    }

    // 2) Fallback universal: CSV con BOM (sin internet, abre en Excel)
    exportCSV(data);
  }catch(err){
    console.error('[export] Error general:', err);
    showToast('⚠️ Error al exportar: '+(err && err.message ? err.message : err));
  }
};

function exportCSV(data){
  const headers=Object.keys(data[0]);
  const esc=v=>{
    v=(v===null||v===undefined)?'':String(v);
    return /[",\n\r;]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  };
  const rows=[headers.join(','), ...data.map(r=>headers.map(h=>esc(r[h])).join(','))];
  const csv='\uFEFF'+rows.join('\r\n'); // BOM UTF-8: Excel muestra acentos correctamente
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='Seguimiento_Actividades.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('📥 Descargado en CSV (se abre en Excel)');
}
